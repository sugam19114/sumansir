<!-- SVG fallback cover for the landing page hero -->
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="40%" stop-color="#b0c8d8"/>
      <stop offset="100%" stop-color="#5a8c6a"/>
    </linearGradient>
    <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4ecf7"/>
      <stop offset="50%" stop-color="#88b4c8"/>
      <stop offset="100%" stop-color="#3d6b4f"/>
    </linearGradient>
    <linearGradient id="fore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="200" cy="80" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="450" cy="50" r="1" fill="white" opacity="0.6"/>
  <circle cx="700" cy="100" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="950" cy="40" r="1" fill="white" opacity="0.7"/>
  <circle cx="1200" cy="80" r="2" fill="white" opacity="0.8"/>
  <circle cx="1500" cy="60" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="1750" cy="90" r="1" fill="white" opacity="0.6"/>
  <circle cx="100" cy="150" r="1" fill="white" opacity="0.5"/>
  <circle cx="850" cy="130" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="1650" cy="120" r="1" fill="white" opacity="0.6"/>
  <!-- Back mountains (Everest-like) -->
  <polygon points="800,150 960,600 640,600" fill="url(#mtn1)" opacity="0.9"/>
  <polygon points="1120,180 1300,600 940,600" fill="url(#mtn2)" opacity="0.85"/>
  <polygon points="400,220 600,600 200,600" fill="#3a6b85" opacity="0.8"/>
  <polygon points="1400,200 1600,600 1200,600" fill="#2e5a6b" opacity="0.8"/>
  <polygon points="1650,250 1820,600 1480,600" fill="#264f5e" opacity="0.7"/>
  <polygon points="100,270 350,600 -100,600" fill="#1e3d4f" opacity="0.7"/>
  <!-- Snow caps -->
  <polygon points="800,150 850,350 750,350" fill="white" opacity="0.95"/>
  <polygon points="1120,180 1175,380 1065,380" fill="white" opacity="0.9"/>
  <polygon points="400,220 445,380 355,380" fill="white" opacity="0.85"/>
  <polygon points="1400,200 1450,370 1350,370" fill="white" opacity="0.85"/>
  <!-- Mid mountains -->
  <polygon points="0,450 300,700 -200,700" fill="#2d5a3d" opacity="0.95"/>
  <polygon points="500,420 800,700 200,700" fill="#3a6b4e" opacity="0.95"/>
  <polygon points="900,440 1200,700 600,700" fill="#2a5238" opacity="0.95"/>
  <polygon points="1300,430 1620,700 980,700" fill="#3d7055" opacity="0.9"/>
  <polygon points="1700,450 1950,700 1450,700" fill="#2d5a3d" opacity="0.9"/>
  <!-- Forest foreground -->
  <rect x="0" y="680" width="1920" height="400" fill="url(#fore)"/>
  <!-- Trees -->
  <g opacity="0.9">
    <polygon points="150,680 180,580 210,680" fill="#1a4a2a"/>
    <polygon points="250,690 285,575 320,690" fill="#1f5530"/>
    <polygon points="350,685 388,565 426,685" fill="#1a4a2a"/>
    <polygon points="1550,680 1585,570 1620,680" fill="#1a4a2a"/>
    <polygon points="1650,688 1688,562 1726,688" fill="#1f5530"/>
    <polygon points="1750,682 1790,555 1830,682" fill="#1a4a2a"/>
    <polygon points="1850,690 1890,570 1930,690" fill="#1f5530"/>
    <polygon points="50,695 80,590 110,695" fill="#163d22"/>
    <polygon points="450,688 482,568 514,688" fill="#1f5530"/>
    <polygon points="1480,692 1512,572 1544,692" fill="#163d22"/>
  </g>
  <!-- Moon -->
  <circle cx="1700" cy="120" r="45" fill="#f0e68c" opacity="0.9"/>
  <circle cx="1722" cy="105" r="40" fill="#1a3a5c"/>
  <!-- Atmospheric glow -->
  <ellipse cx="960" cy="580" rx="600" ry="80" fill="#468432" opacity="0.08"/>
</svg>

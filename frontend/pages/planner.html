<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trip Planner — Gantabya Sahayak</title>
  <meta name="description" content="GIS-powered smart trip planner for Nepal. Get personalized itineraries based on your budget, days, and interests."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css"/>
  <link rel="stylesheet" href="../styles/main.css"/>
  <style>
    .plan-panel { width:380px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column; }
    .plan-header { padding:1.2rem;border-bottom:1px solid var(--border);background:var(--bg-elevated); }
    .plan-title { font-size:0.95rem;font-weight:800;color:var(--primary-glow);text-transform:uppercase;letter-spacing:0.05em; }
    .plan-subtitle { font-family:'Noto Sans Devanagari',sans-serif;font-size:0.8rem;color:var(--text-muted);margin-top:0.1rem; }
    .vehicle-grid { display:grid;grid-template-columns:repeat(5,1fr);gap:0.4rem; }
    .vehicle-btn { padding:0.5rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:0.75rem;text-align:center;transition:all 0.2s;font-family:'Outfit',sans-serif; }
    .vehicle-btn:hover,.vehicle-btn.active { background:var(--primary-muted);border-color:var(--primary);color:var(--primary-glow); }
    .range-display { font-size:1.2rem;font-weight:700;color:var(--primary-glow);text-align:center;margin:0.3rem 0; }
    input[type=range] { width:100%;accent-color:var(--primary);cursor:pointer; }
    .interest-grid { display:grid;grid-template-columns:1fr 1fr;gap:0.4rem; }
    .int-btn { padding:0.5rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:0.78rem;text-align:center;transition:all 0.2s;font-family:'Outfit',sans-serif; }
    .int-btn:hover,.int-btn.active { background:var(--primary-muted);border-color:var(--primary);color:var(--primary-glow); }
    .cost-summary { background:rgba(70,132,50,0.1);border:1px solid rgba(70,132,50,0.3);border-radius:10px;padding:0.75rem;margin-bottom:0.75rem;display:flex;justify-content:space-between;align-items:center; }
    .trip-results { display:none;padding:1rem; }
    .trip-results.show { display:block; }
    .tips-card { background:rgba(243,156,18,0.08);border:1px solid rgba(243,156,18,0.2);border-radius:10px;padding:0.75rem;margin-top:0.75rem; }
    .tips-title { font-size:0.78rem;font-weight:700;color:#f39c12;margin-bottom:0.4rem; }
    .total-dist { text-align:center;font-size:0.82rem;color:var(--text-muted);margin:0.5rem 0; }
    .dl-btn { width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;padding:0.55rem;font-size:0.82rem;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s; }
    .dl-btn:hover { background:rgba(255,255,255,0.12);color:#fff; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="plan-panel">
    <div class="plan-header">
      <div class="plan-title">🗺️ Smart Trip Planner</div>
      <div class="plan-subtitle">यात्रा योजना बनाउनुस्</div>
    </div>

    <div class="planner-form">
      <!-- Budget -->
      <div class="form-group">
        <label class="form-label">💰 Budget (NPR)</label>
        <input type="number" class="form-input-field" id="budgetInput" value="15000" min="1000" max="500000" step="500"/>
      </div>

      <!-- Days -->
      <div class="form-group">
        <label class="form-label">📅 Number of Days</label>
        <div class="range-display" id="daysDisplay">5 Days</div>
        <input type="range" id="daysSlider" min="1" max="21" value="5" oninput="document.getElementById('daysDisplay').textContent=this.value+' Day'+(this.value>1?'s':'')"/>
      </div>

      <!-- Start Location -->
      <div class="form-group">
        <label class="form-label">📍 Starting Location</label>
        <select class="form-select" id="startLocation">
          <option value="Kathmandu">Kathmandu</option>
          <option value="Pokhara">Pokhara</option>
          <option value="Chitwan">Chitwan</option>
          <option value="Biratnagar">Biratnagar</option>
          <option value="Butwal">Butwal</option>
          <option value="Dhangadhi">Dhangadhi</option>
          <option value="Nepalgunj">Nepalgunj</option>
        </select>
      </div>

      <!-- Vehicle -->
      <div class="form-group">
        <label class="form-label">🚗 Vehicle Type</label>
        <div class="vehicle-grid">
          <button class="vehicle-btn" onclick="selectVehicle('walk',this)">🚶<br>Walk</button>
          <button class="vehicle-btn" onclick="selectVehicle('bike',this)">🏍️<br>Bike</button>
          <button class="vehicle-btn active" onclick="selectVehicle('car',this)" id="veh-car">🚗<br>Car</button>
          <button class="vehicle-btn" onclick="selectVehicle('bus',this)">🚌<br>Bus</button>
          <button class="vehicle-btn" onclick="selectVehicle('jeep',this)">🚙<br>Jeep</button>
        </div>
      </div>

      <!-- Interests -->
      <div class="form-group">
        <label class="form-label">🎯 Interests</label>
        <div class="interest-grid">
          <button class="int-btn active" onclick="toggleInterest('trekking',this)">🏔️ Trekking</button>
          <button class="int-btn active" onclick="toggleInterest('culture',this)">🏛️ Culture</button>
          <button class="int-btn" onclick="toggleInterest('wildlife',this)">🦏 Wildlife</button>
          <button class="int-btn" onclick="toggleInterest('adventure',this)">🪂 Adventure</button>
          <button class="int-btn" onclick="toggleInterest('nature',this)">🌿 Nature</button>
          <button class="int-btn" onclick="toggleInterest('relaxation',this)">🧘 Relax</button>
          <button class="int-btn" onclick="toggleInterest('photography',this)">📸 Photo</button>
          <button class="int-btn" onclick="toggleInterest('food',this)">🍜 Food</button>
        </div>
      </div>

      <button class="submit-btn" id="planBtn" onclick="generateTrip()">🗺️ Generate My Itinerary</button>
    </div>

    <!-- Results -->
    <div class="trip-results" id="tripResults">
      <div class="cost-summary">
        <div><div style="font-size:0.72rem;color:var(--text-muted)">Estimated Cost</div><div id="totalCost" style="font-size:1.4rem;font-weight:800;color:var(--primary-glow)">—</div></div>
        <div style="text-align:right"><div style="font-size:0.72rem;color:var(--text-muted)">Total Distance</div><div id="totalDist" style="font-size:1rem;font-weight:700;color:#3498db">—</div></div>
      </div>
      <div id="itineraryContainer"></div>
      <div class="tips-card" id="tipsCard"></div>
      <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
        <button class="dl-btn" onclick="window.print()">🖨️ Print</button>
        <button class="dl-btn" onclick="downloadItinerary()">📥 Download</button>
      </div>
    </div>
  </div>

  <div class="map-container">
    <div id="map"></div>
    <div class="map-controls">
      <div class="layer-panel">
        <div class="layer-title">🗂️ Layers</div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#468432"></div>
          <label>Province</label>
          <label class="toggle-switch"><input type="checkbox" checked onchange="toggleLayer(map,'provinces-fill',this.checked);toggleLayer(map,'provinces-line',this.checked)"/><span class="toggle-slider"></span></label>
        </div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#a8d890"></div>
          <label>Districts</label>
          <label class="toggle-switch"><input type="checkbox" onchange="toggleLayer(map,'districts-line',this.checked)"/><span class="toggle-slider"></span></label>
        </div>
      </div>
    </div>
    <div class="basemap-toggle">
      <div class="basemap-title">🗺️ Base Map</div>
      <div class="basemap-options">
        <button class="basemap-opt active" data-type="osm" onclick="switchBasemap(map,'osm')">Street</button>
        <button class="basemap-opt" data-type="satellite" onclick="switchBasemap(map,'satellite')">Satellite</button>
        <button class="basemap-opt" data-type="terrain" onclick="switchBasemap(map,'terrain')">Terrain</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<script src="../js/app.js"></script>
<script>
Auth.requireLogin();
injectNavbar('planner');

let map, selectedVehicle='car', selectedInterests=['trekking','culture'], lastItinerary=null;
const DEST_COORDS = {
  Kathmandu:[85.324,27.717], Pokhara:[83.986,28.21], Chitwan:[84.354,27.529],
  Langtang:[85.52,28.21], Manaslu:[84.56,28.55], Bhaktapur:[85.43,27.672],
  Lumbini:[83.275,27.483], Rara:[82.088,29.527], Annapurna:[83.82,28.6],
  Everest:[86.925,27.988], 'Everest Region':[86.925,27.988], Kanchenjunga:[87.65,27.7], Mustang:[83.858,28.997],
  Bardiya:[81.5,28.4], Ilam:[87.924,26.912], Gosaikunda:[85.417,28.091],
  'Rara Lake':[82.088,29.527], 'Phewa Lake':[83.957,28.215], 'Tilicho Lake':[83.85,28.68],
  'Koshi Tappu':[87.1,26.65], Dolpa:[82.82,29.05],
  Biratnagar:[87.283,26.45], Butwal:[83.448,27.7], Dhangadhi:[80.6,28.7],
  Nepalgunj:[81.617,28.05], Patan:[85.315,27.673]
};

map = createMap('map', [84.0, 28.0], 6.5);
map.on('load', async () => { await addAdminLayers(map); addProvincePopup(map); });

function selectVehicle(v, btn) {
  document.querySelectorAll('.vehicle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); selectedVehicle=v;
}

function toggleInterest(interest, btn) {
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) { if (!selectedInterests.includes(interest)) selectedInterests.push(interest); }
  else selectedInterests = selectedInterests.filter(i=>i!==interest);
}

async function generateTrip() {
  const btn = document.getElementById('planBtn');
  btn.disabled=true; btn.textContent='⏳ Planning your trip...';
  const budget = parseInt(document.getElementById('budgetInput').value);
  const days = parseInt(document.getElementById('daysSlider').value);
  const start = document.getElementById('startLocation').value;

  let itinerary;
  const apiResult = await API.post('/api/trip/plan', { budget, days, interests:selectedInterests, vehicle:selectedVehicle, start_location:start });
  if (apiResult?.trip) {
    itinerary = apiResult.trip;
  } else {
    itinerary = generateFallbackItinerary(budget, days, start, selectedInterests);
  }

  lastItinerary = itinerary;
  renderItinerary(itinerary);
  plotTripOnMap(itinerary);
  document.getElementById('tripResults').classList.add('show');
  btn.disabled=false; btn.textContent='🗺️ Generate My Itinerary';
  document.getElementById('tripResults').scrollIntoView({ behavior:'smooth' });
}

function generateFallbackItinerary(budget, days, start, interests) {
  const interestDestMap = { trekking:['Langtang','Annapurna','Manaslu'], culture:['Kathmandu','Bhaktapur','Patan','Lumbini'], wildlife:['Chitwan','Bardiya'], nature:['Rara','Gosaikunda','Ilam'], adventure:['Pokhara','Mustang'] };
  let dests=[start]; let seen=new Set([start]);
  interests.forEach(i => { (interestDestMap[i]||[]).forEach(d => { if(!seen.has(d)&&dests.length<days){ dests.push(d);seen.add(d); }}); });
  while(dests.length<days) { const extras=['Pokhara','Bhaktapur','Chitwan','Lumbini']; for(const d of extras){ if(!seen.has(d)){dests.push(d);seen.add(d);break;} } if(dests.length<days) dests.push(dests[dests.length-1]); if(dests.length>=days) break; }
  dests=dests.slice(0,days);
  const itinerary=dests.map((d,i)=>({ day:i+1, destination:d, activities:getActivities(d), estimated_cost_npr:Math.round(budget/(days*1.1)+Math.random()*500), travel_time_hrs:+(1+Math.random()*5).toFixed(1), accommodation:budget>50000?'3-4 Star Hotel':budget>20000?'Guesthouse':'Tea House' }));
  return { days, budget_npr:budget, vehicle:selectedVehicle, start, itinerary, total_estimated_cost:itinerary.reduce((s,d)=>s+d.estimated_cost_npr,0), tips:['Carry cash — ATMs limited in remote areas','Acclimatize above 3000m','Get TIMS card for trekking','Check road conditions daily'] };
}

function getActivities(dest) {
  const m={Kathmandu:['Boudhanath Stupa','Pashupatinath Temple','Swayambhunath','Thamel Market'],Pokhara:['Phewa Lake','Paragliding','Davis Falls','World Peace Pagoda'],Chitwan:['Jungle safari','Elephant watching','Bird watching','Tharu village'],Bhaktapur:['Durbar Square','Pottery Square','Dattatreya Temple'],Lumbini:['Maya Devi Temple','Sacred Garden','International Monasteries'],Langtang:['Kyanjin Gompa','Tserko Ri hike','Glacier walk'],Annapurna:['Poon Hill sunrise','Ghorepani','Modi River'],Rara:['Lake walk','Wildlife spotting','Rara National Park'],Bardiya:['Tiger tracking','Canoe safari','Tharu culture'],Mustang:['Lo Manthang Palace','Cave monasteries','Apple orchards']};
  return m[dest]||[`Explore ${dest}`,`Local culture tour`,`Photography`];
}

function renderItinerary(data) {
  document.getElementById('totalCost').textContent = 'NPR ' + (data.total_estimated_cost||0).toLocaleString();
  const container = document.getElementById('itineraryContainer');
  container.innerHTML = data.itinerary.map(day => `
    <div class="itinerary-day">
      <div class="day-header">
        <div class="day-number">${day.day}</div>
        <div><div class="day-place">${day.destination}</div><div style="font-size:0.72rem;color:var(--text-muted)">${day.accommodation} · ~${day.travel_time_hrs}h travel</div></div>
        <div style="margin-left:auto;text-align:right;font-size:0.78rem;color:var(--primary-glow)">NPR ${(day.estimated_cost_npr||0).toLocaleString()}</div>
      </div>
      <div class="day-body">
        <ul class="activity-list">${(day.activities||[]).map(a=>`<li>${a}</li>`).join('')}</ul>
      </div>
    </div>`).join('');

  const tipsCard = document.getElementById('tipsCard');
  tipsCard.innerHTML = `<div class="tips-title">💡 Travel Tips</div>` + (data.tips||[]).map(t=>`<div style="font-size:0.78rem;color:var(--text-secondary);padding:0.2rem 0">• ${t}</div>`).join('');
}

function plotTripOnMap(data) {
  const coords = [document.getElementById('startLocation').value, ...data.itinerary.map(d=>d.destination)]
    .map(name => DEST_COORDS[name] || DEST_COORDS.Kathmandu);
  const unique = [...new Set(coords.map(c=>c.join()))].map(s=>s.split(',').map(Number));

  // Markers
  document.querySelectorAll('.trip-marker').forEach(e=>e.remove());
  unique.forEach((coord,i) => {
    const el=document.createElement('div');
    el.className='trip-marker';
    el.style.cssText=`width:28px;height:28px;border-radius:50%;background:${i===0?'#3498db':'#468432'};border:3px solid white;display:grid;place-items:center;color:white;font-size:0.7rem;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.4)`;
    el.textContent=i===0?'S':i+1;
    new maplibregl.Marker({element:el}).setLngLat(coord).setPopup(new maplibregl.Popup({offset:15}).setHTML(`<div class="popup-content"><div class="popup-title">${i===0?'Start':data.itinerary[i-1]?.destination||''}</div></div>`)).addTo(map);
  });

  // Route line
  if (unique.length>1) {
    const lineData={type:'Feature',geometry:{type:'LineString',coordinates:unique},properties:{}};
    let totalKm=0;
    for(let i=1;i<unique.length;i++) totalKm+=SpatialTools.calcDistance(unique[i-1],unique[i]);
    document.getElementById('totalDist').textContent=fmtDist(totalKm);

    if(map.getSource('trip-route')){ map.getSource('trip-route').setData(lineData); }
    else { map.addSource('trip-route',{type:'geojson',data:lineData}); map.addLayer({id:'trip-route-line',type:'line',source:'trip-route',paint:{'line-color':'#468432','line-width':3,'line-opacity':0.7,'line-dasharray':[3,2]}}); }
    const bounds=unique.reduce((b,c)=>b.extend(c),new maplibregl.LngLatBounds(unique[0],unique[0]));
    map.fitBounds(bounds,{padding:80});
  }
}

function downloadItinerary() {
  if(!lastItinerary) return;
  let text = `GANTABYA SAHAYAK — TRIP ITINERARY\n${'='.repeat(40)}\nBudget: NPR ${lastItinerary.budget_npr?.toLocaleString()}\nDays: ${lastItinerary.days}\nVehicle: ${lastItinerary.vehicle}\nStart: ${lastItinerary.start}\nEstimated Cost: NPR ${lastItinerary.total_estimated_cost?.toLocaleString()}\n\n`;
  lastItinerary.itinerary.forEach(d => {
    text+=`Day ${d.day}: ${d.destination}\n`;
    (d.activities||[]).forEach(a=>text+=`  • ${a}\n`);
    text+=`  Accommodation: ${d.accommodation}\n  Est. Cost: NPR ${d.estimated_cost_npr?.toLocaleString()}\n\n`;
  });
  text+=`TIPS:\n${(lastItinerary.tips||[]).map(t=>`• ${t}`).join('\n')}`;
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='GantabyaSahayak_Itinerary.txt'; a.click();
}
</script>
</body>
</html>

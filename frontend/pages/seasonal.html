<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seasonal Tourism Map — Gantabya Sahayak</title>
  <meta name="description" content="Seasonal tourism intelligence for Nepal. Best visiting months, weather, festivals, and suitability ratings for all major destinations."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css"/>
  <link rel="stylesheet" href="../styles/main.css"/>
  <style>
    .month-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:0.35rem;margin-bottom:0.75rem; }
    .month-pill { padding:0.35rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:0.75rem;font-family:'Outfit',sans-serif;text-align:center;transition:all 0.2s; }
    .month-pill:hover { border-color:var(--primary);color:var(--primary-glow); }
    .month-pill.active { background:var(--primary);border-color:var(--primary);color:white;font-weight:700; }
    .suit-badge { padding:0.2rem 0.6rem;border-radius:50px;font-size:0.72rem;font-weight:700;display:inline-block; }
    .suit-excellent { background:rgba(46,204,113,0.15);color:#2ecc71; }
    .suit-good { background:rgba(243,156,18,0.15);color:#f39c12; }
    .suit-fair { background:rgba(230,126,34,0.15);color:#e67e22; }
    .suit-poor { background:rgba(231,76,60,0.15);color:#e74c3c; }
    .month-label-overlay { position:absolute;top:1rem;left:50%;transform:translateX(-50%);background:rgba(70,132,50,0.9);border:1px solid #468432;border-radius:10px;padding:0.5rem 1.5rem;font-size:1rem;font-weight:700;color:white;z-index:10;backdrop-filter:blur(10px);pointer-events:none; }
    .dest-detail { background:var(--bg-elevated);border-top:1px solid var(--border);padding:1rem;display:none; }
    .dest-detail.show { display:block; }
    .festival-tag { display:inline-block;padding:0.2rem 0.6rem;background:rgba(243,156,18,0.15);border:1px solid rgba(243,156,18,0.3);color:#f39c12;border-radius:50px;font-size:0.72rem;margin:0.2rem; }
    .best-month-tag { display:inline-block;padding:0.2rem 0.5rem;background:rgba(70,132,50,0.2);border:1px solid rgba(70,132,50,0.4);color:#68c048;border-radius:50px;font-size:0.72rem;margin:0.15rem; }
  </style>
</head>
<body>
<div class="app-container">
  <aside class="sidebar" style="width:340px">
    <div class="sidebar-header">
      <div class="sidebar-title">🌸 Seasonal Tourism Map</div>
      <div style="text-align:center;margin-bottom:0.75rem">
        <div style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em">Selected Month</div>
        <div id="currentMonthDisplay" style="font-size:1.8rem;font-weight:800;color:var(--primary-glow)">October</div>
      </div>
      <div class="month-grid" id="monthGrid"></div>
      <div class="filter-pills">
        <button class="pill active" onclick="setTypeFilter('all',this)">All</button>
        <button class="pill" onclick="setTypeFilter('Trekking',this)">🏔️ Trek</button>
        <button class="pill" onclick="setTypeFilter('Nature',this)">🌿 Nature</button>
        <button class="pill" onclick="setTypeFilter('Culture',this)">🏛️ Culture</button>
        <button class="pill" onclick="setTypeFilter('Wildlife',this)">🦏 Wildlife</button>
        <button class="pill" onclick="setTypeFilter('Adventure',this)">🪂 Adventure</button>
      </div>
    </div>
    <div class="sidebar-section" id="destList" style="max-height:calc(100vh - 420px);overflow-y:auto">
      <div class="spinner"></div>
      <div class="loading-text">Loading seasonal data...</div>
    </div>
    <div class="dest-detail" id="destDetail">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
        <div id="detailName" style="font-weight:700;font-size:0.95rem"></div>
        <button onclick="closeDetail()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem">✕</button>
      </div>
      <canvas id="seasonChart" height="120"></canvas>
      <div id="detailFestivals" style="margin-top:0.75rem"></div>
      <div id="detailBestMonths" style="margin-top:0.5rem"></div>
    </div>
  </aside>

  <div class="map-container">
    <div id="map"></div>
    <div class="month-label-overlay" id="monthLabel">🗓️ October</div>
    <div class="map-controls">
      <div class="layer-panel">
        <div class="layer-title">🗂️ Layers</div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#468432"></div>
          <label>Province</label>
          <label class="toggle-switch"><input type="checkbox" checked onchange="toggleLayer(map,'provinces-fill',this.checked);toggleLayer(map,'provinces-line',this.checked)"/><span class="toggle-slider"></span></label>
        </div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#a8d890"></div>
          <label>Districts</label>
          <label class="toggle-switch"><input type="checkbox" onchange="toggleLayer(map,'districts-line',this.checked)"/><span class="toggle-slider"></span></label>
        </div>
      </div>
    </div>
    <div class="basemap-toggle">
      <div class="basemap-title">🗺️ Base Map</div>
      <div class="basemap-options">
        <button class="basemap-opt active" data-type="osm" onclick="switchBasemap(map,'osm')">Street</button>
        <button class="basemap-opt" data-type="satellite" onclick="switchBasemap(map,'satellite')">Satellite</button>
        <button class="basemap-opt" data-type="terrain" onclick="switchBasemap(map,'terrain')">Terrain</button>
      </div>
    </div>
    <div class="map-info-overlay" style="bottom:5rem">
      <strong>Suitability Legend</strong>
      <div style="margin-top:0.4rem;font-size:0.75rem">
        <div>🟢 Excellent — Best time to visit</div>
        <div>🟡 Good — Suitable with care</div>
        <div>🟠 Fair — Some limitations</div>
        <div>🔴 Poor — Not recommended</div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../js/app.js"></script>
<script>
Auth.requireLogin();
injectNavbar('seasonal');

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SUIT_COLORS = { excellent:'#2ecc71', good:'#f39c12', fair:'#e67e22', poor:'#e74c3c' };

let map, allDests = [], currentMonth = new Date().getMonth(), typeFilter = 'all', destMarkers = [], seasonChart = null;

map = createMap('map', [84.0, 28.0], 6.5);
map.on('load', async () => { await addAdminLayers(map); addProvincePopup(map); await loadSeasonalData(); });

// Build month grid
const monthGrid = document.getElementById('monthGrid');
MONTHS.forEach((m,i) => {
  const btn = document.createElement('button');
  btn.className = 'month-pill' + (i===currentMonth ? ' active' : '');
  btn.textContent = MONTH_SHORT[i];
  btn.onclick = () => selectMonth(i);
  monthGrid.appendChild(btn);
});

async function loadSeasonalData() {
  let data;
  try {
    const res = await fetch(`${API_BASE}/data/seasonal-data.json`);
    if (res.ok) data = await res.json();
  } catch (_) {}
  if (!data) data = await API.get('/api/seasonal');
  if (!data) return;
  allDests = data.destinations || [];
  renderDestMarkers();
  renderDestList();
}

function selectMonth(idx) {
  currentMonth = idx;
  document.querySelectorAll('.month-pill').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.getElementById('currentMonthDisplay').textContent = MONTHS[idx];
  document.getElementById('monthLabel').textContent = '🗓️ ' + MONTHS[idx];
  renderDestMarkers();
  renderDestList();
}

function getSuitColor(s) { return SUIT_COLORS[s] || '#999'; }

function renderDestMarkers() {
  destMarkers.forEach(m => m.remove());
  destMarkers = [];
  const filtered = typeFilter==='all' ? allDests : allDests.filter(d=>d.type===typeFilter);
  filtered.forEach(dest => {
    const month = dest.monthly_data?.[currentMonth];
    if (!month) return;
    const color = getSuitColor(month.suitability);
    const el = document.createElement('div');
    el.style.cssText = `width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.4)`;
    const marker = new maplibregl.Marker({ element: el }).setLngLat([dest.lng, dest.lat])
      .setPopup(new maplibregl.Popup({ offset:10 }).setHTML(`
        <div class="popup-content">
          <div class="popup-title">${dest.name}</div>
          <div class="popup-type" style="color:${color}">${MONTHS[currentMonth]} — ${month.suitability?.toUpperCase()}</div>
          <div class="popup-row"><span>Temp</span><strong>${month.temp_min}°C — ${month.temp_max}°C</strong></div>
          <div class="popup-row"><span>Rainfall</span><strong>${month.rainfall_mm} mm</strong></div>
          <div class="popup-row"><span>Type</span><strong>${dest.type}</strong></div>
          <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:0.4rem;font-style:italic">${month.notes}</div>
          <div class="popup-actions"><button class="popup-btn popup-btn-primary" onclick="document.getElementById('destDetail').classList.add('show')">📊 Full Details</button></div>
        </div>`))
      .addTo(map);
    marker.getElement().addEventListener('click', () => showDestDetail(dest));
    destMarkers.push(marker);
  });
}

function renderDestList() {
  const el = document.getElementById('destList');
  const filtered = typeFilter==='all' ? allDests : allDests.filter(d=>d.type===typeFilter);
  const sorted = [...filtered].sort((a,b) => {
    const sa = ['excellent','good','fair','poor'].indexOf(a.monthly_data?.[currentMonth]?.suitability);
    const sb = ['excellent','good','fair','poor'].indexOf(b.monthly_data?.[currentMonth]?.suitability);
    return sa - sb;
  });
  el.innerHTML = `<div class="section-divider">Destinations (${sorted.length})</div>` +
    sorted.map(dest => {
      const month = dest.monthly_data?.[currentMonth] || {};
      const color = getSuitColor(month.suitability);
      return `<div class="info-card" onclick="map.flyTo({center:[${dest.lng},${dest.lat}],zoom:9});showDestDetail(allDests.find(d=>d.name==='${dest.name}'))">
        <div class="card-header">
          <div class="card-icon" style="background:${color}22;font-size:1.1rem">${dest.type==='Trekking'?'🏔️':dest.type==='Wildlife'?'🦏':dest.type==='Culture'?'🏛️':dest.type==='Adventure'?'🪂':'🌿'}</div>
          <div><div class="card-title">${dest.name}</div><div class="card-subtitle">${dest.type} · ${month.temp_min}–${month.temp_max}°C · ${month.rainfall_mm}mm</div></div>
          <span class="suit-badge suit-${month.suitability||'fair'}">${month.suitability||'fair'}</span>
        </div>
        <div class="card-desc">${month.notes||''}</div>
      </div>`;
    }).join('');
}

function showDestDetail(dest) {
  if (!dest) return;
  document.getElementById('destDetail').classList.add('show');
  document.getElementById('detailName').textContent = dest.name;
  document.getElementById('detailFestivals').innerHTML = dest.festivals?.map(f=>`<span class="festival-tag">🎉 ${f}</span>`).join('') || '';
  document.getElementById('detailBestMonths').innerHTML = '<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.3rem">Best months:</div>' +
    (dest.best_months||[]).map(m=>`<span class="best-month-tag">${m}</span>`).join('');
  const labels = MONTH_SHORT;
  const temps = dest.monthly_data?.map(m=>m.temp_max) || [];
  const rainfall = dest.monthly_data?.map(m=>m.rainfall_mm) || [];
  if (seasonChart) seasonChart.destroy();
  seasonChart = new Chart(document.getElementById('seasonChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Rainfall mm',data:rainfall,backgroundColor:'rgba(52,152,219,0.3)',borderColor:'#3498db',borderWidth:1,yAxisID:'y1'},
        {label:'Max Temp °C',data:temps,type:'line',borderColor:'#e74c3c',backgroundColor:'transparent',yAxisID:'y2',pointRadius:3,tension:0.4}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'rgba(255,255,255,0.6)',font:{size:9}}}},
      scales:{
        x:{ticks:{color:'rgba(255,255,255,0.5)',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}},
        y1:{position:'left',ticks:{color:'#3498db',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'mm',color:'rgba(255,255,255,0.4)',font:{size:9}}},
        y2:{position:'right',ticks:{color:'#e74c3c',font:{size:9}},grid:{display:false},title:{display:true,text:'°C',color:'rgba(255,255,255,0.4)',font:{size:9}}}
      }
    }
  });
}

function closeDetail() {
  document.getElementById('destDetail').classList.remove('show');
}

function setTypeFilter(type, btn) {
  document.querySelectorAll('.filter-pills .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  typeFilter = type;
  renderDestMarkers();
  renderDestList();
}
</script>
</body>
</html>

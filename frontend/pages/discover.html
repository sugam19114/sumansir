<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hidden Destinations — Gantabya Sahayak</title>
  <meta name="description" content="Discover lesser-known waterfalls, lakes, cultural villages, and hidden hikes across Nepal."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css"/>
  <link rel="stylesheet" href="../styles/main.css"/>
  <style>
    .star-display { color:#f39c12;font-size:0.85rem; }
    .crowd-low { background:rgba(46,204,113,0.15);color:#2ecc71;padding:0.15rem 0.5rem;border-radius:50px;font-size:0.7rem;font-weight:700; }
    .crowd-medium { background:rgba(243,156,18,0.15);color:#f39c12;padding:0.15rem 0.5rem;border-radius:50px;font-size:0.7rem;font-weight:700; }
    .view-tabs { display:flex;border-bottom:1px solid var(--border);background:var(--bg-elevated); }
    .view-tab { flex:1;padding:0.6rem;text-align:center;font-size:0.8rem;font-weight:600;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.2s; }
    .view-tab.active { color:var(--primary-glow);border-bottom-color:var(--primary-glow); }
    .table-wrapper { overflow-x:auto;padding:0.5rem; }
    .nearby-btn { width:100%;background:rgba(22,160,133,0.15);border:1px solid rgba(22,160,133,0.3);color:#16a085;border-radius:10px;padding:0.6rem;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.3s;margin-top:0.5rem; }
    .nearby-btn:hover { background:rgba(22,160,133,0.3); }
  </style>
</head>
<body>
<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">🔍 Hidden Destinations</div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" id="discoverSearch" placeholder="Search destinations..." oninput="applyFilters()"/>
      </div>
      <div class="form-group" style="margin-bottom:0.5rem">
        <select class="form-select" id="provinceFilter" onchange="applyFilters()">
          <option value="all">All Provinces</option>
          <option value="Koshi">Koshi Province</option>
          <option value="Madhesh">Madhesh Province</option>
          <option value="Bagmati">Bagmati Province</option>
          <option value="Gandaki">Gandaki Province</option>
          <option value="Lumbini">Lumbini Province</option>
          <option value="Karnali">Karnali Province</option>
          <option value="Sudurpashchim">Sudurpashchim Province</option>
        </select>
      </div>
      <div class="filter-pills" id="catFilter" style="flex-wrap:wrap">
        <button class="pill active" onclick="setCatFilter('all',this)">All</button>
        <button class="pill" onclick="setCatFilter('waterfall',this)" style="color:#3498db;border-color:#3498db">💧 Waterfall</button>
        <button class="pill" onclick="setCatFilter('lake',this)" style="color:#16a085;border-color:#16a085">🏞️ Lake</button>
        <button class="pill" onclick="setCatFilter('cultural_village',this)" style="color:#e67e22;border-color:#e67e22">🏘️ Village</button>
        <button class="pill" onclick="setCatFilter('homestay',this)" style="color:#f39c12;border-color:#f39c12">🏡 Homestay</button>
        <button class="pill" onclick="setCatFilter('short_hike',this)" style="color:#2ecc71;border-color:#2ecc71">🥾 Hike</button>
        <button class="pill" onclick="setCatFilter('viewpoint',this)" style="color:#9b59b6;border-color:#9b59b6">🔭 Viewpoint</button>
      </div>
      <div class="filter-pills" style="margin-top:0.25rem">
        <button class="pill active" onclick="setCrowdFilter('all',this)">All Crowd</button>
        <button class="pill" onclick="setCrowdFilter('low',this)" style="color:#2ecc71;border-color:#2ecc71">🟢 Low Crowd</button>
        <button class="pill" onclick="setCrowdFilter('medium',this)" style="color:#f39c12;border-color:#f39c12">🟡 Medium</button>
      </div>
      <button class="nearby-btn" onclick="findNearby()">📍 Find Within 30km of Me</button>
    </div>

    <div class="view-tabs">
      <div class="view-tab active" onclick="switchView('cards',this)">📋 Card View</div>
      <div class="view-tab" onclick="switchView('table',this)">📊 Table View</div>
    </div>

    <div id="cardView" class="sidebar-section">
      <div class="spinner"></div>
      <div class="loading-text">Loading destinations...</div>
    </div>
    <div id="tableView" style="display:none">
      <div class="table-wrapper">
        <table class="attr-table" id="attrTable">
          <thead><tr><th>Name</th><th>Category</th><th>District</th><th>Rating</th><th>Crowd</th></tr></thead>
          <tbody id="attrTableBody"></tbody>
        </table>
      </div>
    </div>
  </aside>

  <div class="map-container">
    <div id="map"></div>
    <div class="map-controls">
      <div class="layer-panel">
        <div class="layer-title">🗂️ Layers</div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#468432"></div>
          <label>Province</label>
          <label class="toggle-switch"><input type="checkbox" checked onchange="toggleLayer(map,'provinces-fill',this.checked);toggleLayer(map,'provinces-line',this.checked)"/><span class="toggle-slider"></span></label>
        </div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#a8d890"></div>
          <label>Districts</label>
          <label class="toggle-switch"><input type="checkbox" onchange="toggleLayer(map,'districts-line',this.checked)"/><span class="toggle-slider"></span></label>
        </div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#68c048"></div>
          <label>Local Level</label>
          <label class="toggle-switch"><input type="checkbox" onchange="loadLocalLevelOnDemand(map,this.checked)"/><span class="toggle-slider"></span></label>
        </div>
      </div>
    </div>
    <div class="basemap-toggle">
      <div class="basemap-title">🗺️ Base Map</div>
      <div class="basemap-options">
        <button class="basemap-opt active" data-type="osm" onclick="switchBasemap(map,'osm')">Street</button>
        <button class="basemap-opt" data-type="satellite" onclick="switchBasemap(map,'satellite')">Satellite</button>
        <button class="basemap-opt" data-type="terrain" onclick="switchBasemap(map,'terrain')">Terrain</button>
      </div>
    </div>
    <div class="map-info-overlay" style="bottom:5rem">
      <strong>Category Legend</strong>
      <div style="font-size:0.72rem;margin-top:0.3rem">
        <div><span style="color:#3498db">●</span> Waterfall &nbsp;<span style="color:#16a085">●</span> Lake</div>
        <div><span style="color:#e67e22">●</span> Village &nbsp;<span style="color:#f39c12">●</span> Homestay</div>
        <div><span style="color:#2ecc71">●</span> Hike &nbsp;<span style="color:#9b59b6">●</span> Viewpoint</div>
        <div><span style="color:#e91e63">●</span> Local Exp.</div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<script src="../js/app.js"></script>
<script>
Auth.requireLogin();
injectNavbar('discover');

let map, allDests=[], destMarkers=[], catFilter='all', crowdFilter='all', currentView='cards';
const CAT_COLORS={waterfall:'#3498db',lake:'#16a085',cultural_village:'#e67e22',homestay:'#f39c12',short_hike:'#2ecc71',viewpoint:'#9b59b6',local_experience:'#e91e63'};
const CAT_ICONS={waterfall:'💧',lake:'🏞️',cultural_village:'🏘️',homestay:'🏡',short_hike:'🥾',viewpoint:'🔭',local_experience:'🎭'};

map = createMap('map', [84.5, 28.0], 7);
map.on('load', async () => { await addAdminLayers(map); addProvincePopup(map); await loadDestinations(); });

async function loadDestinations() {
  const data = await loadGeoJSON('/api/destinations', '../../data/hidden-destinations.geojson');
  if (!data) return;
  allDests = data.features || [];
  renderAll(allDests);
}

function renderAll(features) {
  destMarkers.forEach(m=>m.remove()); destMarkers=[];
  features.forEach(f => {
    const p=f.properties; const coords=f.geometry.coordinates;
    const color=CAT_COLORS[p.category]||'#888';
    const el=document.createElement('div');
    el.style.cssText=`width:12px;height:12px;border-radius:50%;background:${color};border:2px solid white;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.3)`;
    const m=new maplibregl.Marker({element:el}).setLngLat(coords)
      .setPopup(new maplibregl.Popup({offset:10}).setHTML(`
        <div class="popup-content">
          <div class="popup-title">${CAT_ICONS[p.category]||'📍'} ${p.name}</div>
          <div class="popup-type" style="color:${color}">${(p.category||'').replace('_',' ')}</div>
          <div class="popup-row"><span>District</span><strong>${p.district||'—'}</strong></div>
          <div class="popup-row"><span>Province</span><strong>${p.province||'—'}</strong></div>
          <div class="popup-row"><span>Best Season</span><strong>${p.best_season||'—'}</strong></div>
          <div class="popup-row"><span>Near</span><strong>${p.nearest_city||'—'} (${p.distance_from_city_km||'?'} km)</strong></div>
          ${p.entry_fee_npr>0?`<div class="popup-row"><span>Entry Fee</span><strong>NPR ${p.entry_fee_npr}</strong></div>`:'<div class="popup-row"><span>Entry Fee</span><strong>Free</strong></div>'}
          <div class="popup-row"><span>Rating</span><strong>${'⭐'.repeat(Math.round(p.rating||3))}</strong></div>
          <div class="popup-row"><span>Crowd</span><strong><span class="crowd-${p.crowd_level||'low'}">${(p.crowd_level||'low').toUpperCase()}</span></strong></div>
          <div class="card-desc" style="margin-top:0.5rem">${p.description||''}</div>
        </div>`)).addTo(map);
    destMarkers.push(m);
  });
  if (currentView==='cards') renderCards(features);
  else renderTable(features);
}

function renderCards(features) {
  const el=document.getElementById('cardView');
  if(!features.length){el.innerHTML='<p class="text-muted" style="padding:1rem;text-align:center">No destinations found.</p>';return;}
  el.innerHTML=`<div class="section-divider">Destinations (${features.length})</div>`+
    features.map(f=>{
      const p=f.properties; const color=CAT_COLORS[p.category]||'#888';
      return `<div class="info-card" onclick="map.flyTo({center:[${f.geometry.coordinates}],zoom:12})">
        <div class="card-header">
          <div class="card-icon" style="background:${color}22">${CAT_ICONS[p.category]||'📍'}</div>
          <div><div class="card-title">${p.name}</div><div class="card-subtitle">${p.district||''}, ${p.province||''}</div></div>
          <div style="text-align:right"><span class="crowd-${p.crowd_level||'low'}">${p.crowd_level||'low'}</span></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:0.4rem;font-size:0.78rem">
          <span style="color:${color}">${(p.category||'').replace('_',' ')}</span>
          <span class="star-display">${'⭐'.repeat(Math.round(p.rating||3))}</span>
          <span style="color:var(--text-muted)">${p.nearest_city||'—'} · ${p.distance_from_city_km||'?'}km</span>
        </div>
      </div>`;
    }).join('');
}

function renderTable(features) {
  const tbody=document.getElementById('attrTableBody');
  tbody.innerHTML=features.map((f,i)=>{
    const p=f.properties; const color=CAT_COLORS[p.category]||'#888';
    return `<tr onclick="map.flyTo({center:[${f.geometry.coordinates}],zoom:12})" style="cursor:pointer">
      <td>${CAT_ICONS[p.category]||'📍'} ${p.name}</td>
      <td style="color:${color}">${(p.category||'').replace('_',' ')}</td>
      <td>${p.district||'—'}</td>
      <td>${'⭐'.repeat(Math.round(p.rating||3))}</td>
      <td><span class="crowd-${p.crowd_level||'low'}">${p.crowd_level||'low'}</span></td>
    </tr>`;
  }).join('');
}

function applyFilters() {
  const q=document.getElementById('discoverSearch').value.toLowerCase();
  const prov=document.getElementById('provinceFilter').value;
  let f=allDests;
  if(catFilter!=='all') f=f.filter(d=>d.properties.category===catFilter);
  if(crowdFilter!=='all') f=f.filter(d=>d.properties.crowd_level===crowdFilter);
  if(prov!=='all') f=f.filter(d=>(d.properties.province||'').includes(prov));
  if(q) f=f.filter(d=>d.properties.name?.toLowerCase().includes(q)||d.properties.description?.toLowerCase().includes(q));
  renderAll(f);
}

function setCatFilter(cat, btn) {
  document.querySelectorAll('#catFilter .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); catFilter=cat; applyFilters();
}

function setCrowdFilter(crowd, btn) {
  document.querySelectorAll('.filter-pills:last-of-type .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); crowdFilter=crowd; applyFilters();
}

function switchView(view, tab) {
  currentView=view;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('cardView').style.display=view==='cards'?'':'none';
  document.getElementById('tableView').style.display=view==='table'?'':'none';
  const filtered=getFiltered();
  if(view==='cards') renderCards(filtered); else renderTable(filtered);
}

function getFiltered() {
  const q=document.getElementById('discoverSearch').value.toLowerCase();
  const prov=document.getElementById('provinceFilter').value;
  let f=allDests;
  if(catFilter!=='all') f=f.filter(d=>d.properties.category===catFilter);
  if(crowdFilter!=='all') f=f.filter(d=>d.properties.crowd_level===crowdFilter);
  if(prov!=='all') f=f.filter(d=>(d.properties.province||'').includes(prov));
  if(q) f=f.filter(d=>d.properties.name?.toLowerCase().includes(q));
  return f;
}

function findNearby() {
  navigator.geolocation.getCurrentPosition(pos => {
    const userPt=turf.point([pos.coords.longitude,pos.coords.latitude]);
    const buf=SpatialTools.createBuffer(userPt,30);
    const nearby=allDests.filter(f=>{ try{return turf.booleanPointInPolygon(turf.point(f.geometry.coordinates),buf);}catch(e){return false;} });
    if(map.getSource('nearby-buf')){ map.getSource('nearby-buf').setData(buf); }
    else { map.addSource('nearby-buf',{type:'geojson',data:buf}); map.addLayer({id:'nearby-buf-fill',type:'fill',source:'nearby-buf',paint:{'fill-color':'#16a085','fill-opacity':0.08,'fill-outline-color':'#16a085'}}); }
    map.flyTo({center:[pos.coords.longitude,pos.coords.latitude],zoom:10});
    renderAll(nearby);
    alert(`Found ${nearby.length} hidden destinations within 30km of your location!`);
  },()=>alert('Location access required'));
}
</script>
</body>
</html>

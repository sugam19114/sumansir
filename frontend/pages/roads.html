<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Road Condition Monitor — Gantabya Sahayak</title>
  <meta name="description" content="Real-time road condition monitoring across Nepal. Check landslides, flood zones, road closures, and alternative routes."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">🛣️ Road Condition Monitor</div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" id="roadSearch" placeholder="Search road or location..." oninput="filterRoads()"/>
      </div>
      <div class="filter-pills" id="statusFilters">
        <button class="pill active" onclick="setStatusFilter('all', this)">All</button>
        <button class="pill" onclick="setStatusFilter('good', this)" style="border-color:#2ecc71;color:#2ecc71">✅ Good</button>
        <button class="pill" onclick="setStatusFilter('caution', this)" style="border-color:#f39c12;color:#f39c12">⚠️ Caution</button>
        <button class="pill" onclick="setStatusFilter('damaged', this)" style="border-color:#e67e22;color:#e67e22">🔶 Damaged</button>
        <button class="pill" onclick="setStatusFilter('closed', this)" style="border-color:#e74c3c;color:#e74c3c">🚫 Closed</button>
        <button class="pill" onclick="setStatusFilter('construction', this)" style="border-color:#3498db;color:#3498db">🏗️ Construction</button>
      </div>
      <div id="weather-widget-road"></div>
    </div>
    <div class="sidebar-section" id="roadList">
      <div class="spinner"></div>
      <div class="loading-text">Loading road conditions...</div>
    </div>
  </aside>

  <!-- Map -->
  <div class="map-container">
    <div id="map"></div>

    <!-- Layer controls -->
    <div class="map-controls">
      <div class="layer-panel">
        <div class="layer-title">🗂️ Overlay Layers</div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#468432"></div>
          <label>Province Boundaries</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleProvinces" checked onchange="toggleLayer(map,'provinces-fill',this.checked);toggleLayer(map,'provinces-line',this.checked)"/>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#a8d890"></div>
          <label>District Boundaries</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleDistricts" onchange="toggleLayer(map,'districts-line',this.checked)"/>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#68c048"></div>
          <label>Local Level</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleLocal" onchange="loadLocalLevelOnDemand(map,this.checked)"/>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="layer-item">
          <div class="layer-dot" style="background:#e74c3c"></div>
          <label>Road Conditions</label>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleRoads" checked onchange="toggleLayer(map,'roads-layer',this.checked)"/>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- Base map toggle -->
    <div class="basemap-toggle">
      <div class="basemap-title">🗺️ Base Map</div>
      <div class="basemap-options">
        <button class="basemap-opt active" data-type="osm" onclick="switchBasemap(map,'osm')">Street</button>
        <button class="basemap-opt" data-type="satellite" onclick="switchBasemap(map,'satellite')">Satellite</button>
        <button class="basemap-opt" data-type="terrain" onclick="switchBasemap(map,'terrain')">Terrain</button>
      </div>
    </div>

    <!-- Legend -->
    <div class="map-info-overlay" style="bottom:5rem">
      <strong>Road Status Legend</strong>
      <div style="margin-top:0.4rem;font-size:0.75rem">
        <div>🟢 Good — Safe to travel</div>
        <div>🟡 Caution — Drive carefully</div>
        <div>🟠 Damaged — 4WD only</div>
        <div>🔴 Closed — No access</div>
        <div>🔵 Construction — Slow</div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<script src="../js/app.js"></script>
<script>
  Auth.requireLogin();
  injectNavbar('roads');

  let map, allRoads = [], currentFilter = 'all';

  const ROAD_COLORS = {
    good: '#2ecc71', caution: '#f39c12', damaged: '#e67e22',
    closed: '#e74c3c', construction: '#3498db'
  };

  // Init map
  map = createMap('map', [84.124, 28.394], 6.5);
  map.on('load', async () => {
    await addAdminLayers(map);
    addProvincePopup(map);
    await loadRoads();
    loadWeatherWidget('weather-widget-road', 27.7172, 85.324);
  });

  async function loadRoads() {
    const data = await loadGeoJSON('/api/roads', '../../data/road-conditions.geojson');
    if (!data) return;
    allRoads = data.features || [];
    renderRoadList(allRoads);
    addRoadsToMap(data);
  }

  function addRoadsToMap(data) {
    if (map.getSource('roads')) {
      map.getSource('roads').setData(data);
      return;
    }
    map.addSource('roads', { type: 'geojson', data });
    map.addLayer({
      id: 'roads-layer', type: 'line', source: 'roads',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: {
        'line-color': ['match', ['get', 'status'],
          'good', '#2ecc71', 'caution', '#f39c12', 'damaged', '#e67e22',
          'closed', '#e74c3c', 'construction', '#3498db', '#999'
        ],
        'line-width': 4,
        'line-opacity': 0.85
      }
    });

    // Popup on road click
    map.on('click', 'roads-layer', (e) => {
      const p = e.features[0].properties;
      const color = ROAD_COLORS[p.status] || '#999';
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`
          <div class="popup-content">
            <div class="popup-title">${p.name}</div>
            <div class="popup-type" style="color:${color}">● ${p.status?.toUpperCase()}</div>
            <div class="popup-row"><span>Condition</span><strong>${p.condition_details || '—'}</strong></div>
            <div class="popup-row"><span>Affected by</span><strong>${p.affected_by || 'Normal'}</strong></div>
            <div class="popup-row"><span>Updated</span><strong>${p.last_updated || '—'}</strong></div>
            ${p.alternative_route ? `<div class="popup-row"><span>Alternative</span><strong>${p.alternative_route}</strong></div>` : ''}
            <div class="popup-actions">
              <button class="popup-btn popup-btn-primary" onclick="this.closest('.maplibregl-popup').remove()">✓ Got it</button>
              ${p.alternative_route ? `<button class="popup-btn popup-btn-secondary" onclick="alert('Alternative: ${p.alternative_route}')">🔄 Alt Route</button>` : ''}
            </div>
          </div>`)
        .addTo(map);
    });
    map.on('mouseenter', 'roads-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'roads-layer', () => { map.getCanvas().style.cursor = ''; });
  }

  function renderRoadList(roads) {
    const el = document.getElementById('roadList');
    if (!roads.length) {
      el.innerHTML = '<p class="text-muted" style="padding:1rem;text-align:center">No roads found matching filter.</p>';
      return;
    }
    el.innerHTML = `<div class="section-divider">Roads (${roads.length})</div>` +
      roads.map(f => {
        const p = f.properties;
        const color = ROAD_COLORS[p.status] || '#999';
        const coords = f.geometry?.coordinates;
        const midCoord = coords ? coords[Math.floor(coords.length/2)] : null;
        return `
          <div class="info-card" onclick="${midCoord ? `map.flyTo({center:[${midCoord[0]},${midCoord[1]}],zoom:10})` : ''}">
            <div class="card-header">
              <div class="card-icon" style="background:${color}22;font-size:1.2rem">🛣️</div>
              <div>
                <div class="card-title">${p.name}</div>
                <div class="card-subtitle">${p.district || ''} ${p.province ? '· ' + p.province : ''}</div>
              </div>
              <span class="status-badge" style="margin-left:auto;background:${color}22;color:${color}">● ${p.status}</span>
            </div>
            <div class="card-desc">${p.condition_details || 'No details available.'}</div>
            ${p.affected_by && p.affected_by !== 'Normal' ? `<div style="font-size:0.75rem;color:#f39c12;margin-top:0.3rem">⚠️ ${p.affected_by}</div>` : ''}
          </div>`;
      }).join('');
  }

  function setStatusFilter(status, btn) {
    document.querySelectorAll('#statusFilters .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = status;
    filterRoads();
  }

  function filterRoads() {
    const q = document.getElementById('roadSearch').value.toLowerCase();
    let filtered = allRoads;
    if (currentFilter !== 'all') {
      filtered = filtered.filter(f => f.properties.status === currentFilter);
    }
    if (q) {
      filtered = filtered.filter(f =>
        f.properties.name?.toLowerCase().includes(q) ||
        f.properties.district?.toLowerCase().includes(q)
      );
    }
    renderRoadList(filtered);
    const filteredGJ = { type: 'FeatureCollection', features: filtered };
    if (map.getSource('roads')) map.getSource('roads').setData(filteredGJ);
  }

  // Spatial tool: Buffer analysis around user location
  function runBufferAnalysis() {
    navigator.geolocation.getCurrentPosition((pos) => {
      const pt = turf.point([pos.coords.longitude, pos.coords.latitude]);
      const buffer = SpatialTools.createBuffer(pt, 50); // 50km buffer

      if (map.getSource('buffer')) {
        map.getSource('buffer').setData(buffer);
      } else {
        map.addSource('buffer', { type: 'geojson', data: buffer });
        map.addLayer({ id: 'buffer-layer', type: 'fill', source: 'buffer',
          paint: { 'fill-color': '#468432', 'fill-opacity': 0.1, 'fill-outline-color': '#468432' }
        });
      }

      // Filter roads within buffer
      const roadsInBuffer = allRoads.filter(f => {
        if (f.geometry.type !== 'LineString') return false;
        const midIdx = Math.floor(f.geometry.coordinates.length / 2);
        const pt2 = turf.point(f.geometry.coordinates[midIdx]);
        return SpatialTools.pointInPolygon(pt2, buffer);
      });

      if (roadsInBuffer.length) {
        alert(`Found ${roadsInBuffer.length} roads within 50km of your location.`);
        renderRoadList(roadsInBuffer);
      }
    }, () => alert('Location access denied.'));
  }
</script>
</body>
</html>

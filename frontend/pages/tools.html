function smoothTrail(points){const output=[];for(let i=0;i<points.length-1;i++){const a=points[i],b=points[i+1],dx=b[0]-a[0],dy=b[1]-a[1],len=Math.hypot(dx,dy)||1,bend=Math.min(.012,len*.16)*(i%2?-1:1);for(let n=0;n<8;n++){const t=n/8,curve=Math.sin(Math.PI*t)*bend;output.push([a[0]+dx*t-(dy/len)*curve,a[1]+dy*t+(dx/len)*curve]);}}output.push(points[points.length-1]);return output;}

async function route(f){if(!user)return;let line={type:'Feature',geometry:{type:'LineString',coordinates:[user,f.geometry.coordinates]}},routeNote='straight-line guidance';try{let r=await fetch(`https://router.project-osrm.org/route/v1/driving/${user.join(',')};${f.geometry.coordinates.join(',')}?overview=full&geometries=geojson`);let d=await r.json();if(d.routes?.[0]?.geometry){line={type:'Feature',geometry:d.routes[0].geometry};routeNote=`road route · ${fmtDist(d.routes[0].distance/1000)}`}}catch(_){/* Remote routing is optional; retain the local guidance line. */}if(map.getSource('analysis')){map.getSource('analysis').setData(line)}else{map.addSource('analysis',{type:'geojson',data:line});map.addLayer({id:'analysis-line',type:'line',source:'analysis',paint:{'line-color':'#3498db','line-width':4,'line-dasharray':[2,2]}})}map.fitBounds([user,f.geometry.coordinates],{padding:90});result.innerHTML=`Route shown to <b>${esc(f.properties.name)}</b> — ${routeNote}.`;}

window.analyzeRoute=async i=>{const f=data.routes.features[i],p=f.properties,g=TRAIL_GUIDES[p.name],fallback={type:'LineString',coordinates:g?.points||f.geometry.coordinates};result.textContent='Loading mapped hiking trail and field guide…';const mapped=await API.get(`/api/trekking/${encodeURIComponent(p.name)}/geometry`);const trail={type:'Feature',geometry:mapped?.geometry||fallback,properties:p};const km=SpatialTools.lineLength(trail),hours=Math.max(1,km/3.5),stages=g?.stages||['Trailhead → first overnight stop','Continue on the marked trail','Destination / high point','Return by the documented route'],highlights=Array.isArray(p.key_highlights)?p.key_highlights:[];clear();map.addSource('analysis',{type:'geojson',data:trail});map.addLayer({id:'analysis-line',type:'line',source:'analysis',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#f39c12','line-width':4,'line-opacity':.95}});const points=g?.points||f.geometry.coordinates;points.forEach(c=>{const e=document.createElement('div');e.style.cssText='width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #f39c12';markers.push(new maplibregl.Marker({element:e}).setLngLat(c).addTo(map))});map.fitBounds(turf.bbox(trail),{padding:80});result.innerHTML=`<b>${esc(p.name)}</b><br><span class="text-muted">${esc(mapped?.source||'Local checkpoint trail')}</span><hr><b>Trail facts</b><br>${km.toFixed(1)} km mapped trail · ~${hours.toFixed(1)} walking hours<br>${esc(p.difficulty)} · ${esc(p.duration_days)} days · summit/maximum ${Number(p.max_elevation_m||0).toLocaleString()} m<br>Best months: ${esc(p.season_best||'Spring and autumn')}<br><br><b>Stage-by-stage plan</b><ol>${stages.map(s=>`<li>${esc(s)}</li>`).join('')}</ol><b>Highlights</b><ul>${highlights.map(h=>`<li>${esc(h)}</li>`).join('')}</ul><b>Permits</b><br>${esc(g?.permit||Array.isArray(p.permits_required)?p.permits_required.join(', '):p.permits_required||'Confirm locally')}<br><br><b>Field checklist</b><br>Offline map + power b function buildDestinationShortlist(){const days=Math.max(1,+document.querySelector('#tripDays').value||1),budget=Math.max(1000,+document.querySelector('#tripBudget').value||1000),vehicle=document.querySelector('#tripVehicle').value,comfort=document.querySelector('#tripComfort').value,pace=document.querySelector('#tripPace').value,group=Math.max(1,+document.querySelector('#tripGroup').value||1),interests=[...filters.querySelectorAll('input[type=checkbox]:checked')].map(x=>x.value);let choices=Object.entries(TRIP_DETAILS).map(([name,d])=>({name,...d,estimated:d.cost*d.days*group,distance:TRIP_DESTINATIONS[name]?SpatialTools.calcDistance(user,TRIP_DESTINATIONS[name]):0})).filter(d=>interests.some(i=>d.tags.includes(i)));if(!choices.length)choices=Object.entries(TRIP_DETAILS).map(([name,d])=>({name,...d,estimated:d.cost*d.days*group,distance:TRIP_DESTINATIONS[name]?SpatialTools.calcDistance(user,TRIP_DESTINATIONS[name]):0}));choices.forEach(d=>d.feasible=d.days<=days&&d.estimated<=budget);choices.sort((a,b)=>(b.feasible-a.feasible)||(a.estimated-b.estimated));window.tripDestinationChoices={choices,days,budget,vehicle,comfort,pace,group,interests};const features=choices.map(d=>({type:'Feature',geometry:{type:'Point',coordinates:TRIP_DESTINATIONS[d.name]||TRIP_DESTINATIONS.Kathmandu},properties:{name:d.name,type:'trip destination'}}));addPoints(features,'#468432',f=>showTripDestinationDetail(f.properties.name));result.innerHTML=`<b>${choices.filter(c=>c.feasible).length}</b> destination${choices.filter(c=>c.feasible).length===1?'':'s'} fit your ${days}-day, NPR ${budget.toLocaleString()} plan.<br><span class="text-muted">Choose a destination to open its full trip guide.</span><div class="choice-list">${choices.map(d=>`<button class="map-ctrl-btn" onclick="showTripDestinationDetail('${esc(d.name)}')"><b>${esc(d.name)}</b><br><span class="text-muted">${esc(d.tags.map(pretty).join(' · '))} · ${d.days} days · NPR ${d.estimated.toLocaleString()} ${d.feasible?'✓ fits':'· needs more time/budget'}</span></button>`).join('')}</div>`}
function showTripDestinationDetail(name){const ctx=window.tripDestinationChoices,d=TRIP_DETAILS[name];if(!ctx||!d)return;const coord=TRIP_DESTINATIONS[name]||TRIP_DESTINATIONS.Kathmandu;const cost=d.cost*d.days*ctx.group,transport=Math.round(cost*.25),stay=Math.round(cost*.36),food=Math.round(cost*.22),activities=Math.round(cost*.1),reserve=Math.round(cost*.07),travelKm=SpatialTools.calcDistance(user,coord),speed={car:50,bus:35,bike:25,walk:4}[ctx.vehicle]||35,travelHours=travelKm/speed,stayText=d.stay[ctx.comfort]||d.stay.balanced;const dayPlan=Array.from({length:Math.min(ctx.days,d.days)},(_,i)=>`<li><b>Day ${i+1}:</b> ${esc(d.activities[i%d.activities.length])}${i===0?` · allow ~${travelHours.toFixed(1)} h travel from your location`:''}</li>`).join('');result.innerHTML=`<b>${esc(name)} — detailed trip plan</b><div class="text-muted">${esc(d.summary)}</div><hr><div class="popup-row"><span>Best trip length</span><strong>${d.days} days</strong></div><div class="popup-row"><span>From your location</span><strong>${fmtDist(travelKm)} · ~${travelHours.toFixed(1)} h by ${esc(pretty(ctx.vehicle))}</strong></div><div class="popup-row"><span>Budget estimate</span><strong style="color:${cost<=ctx.budget?'#2ecc71':'#e74c3c'}">NPR ${cost.toLocaleString()} ${cost<=ctx.budget?'✓':'(over budget)'}</strong></div><div class="popup-row"><span>Recommended stay</span><strong>${esc(stayText)}</strong></div><div class="popup-row"><span>Best season</span><strong>${esc(d.season)}</strong></div><b>What you can do</b><ul>${d.activities.map(a=>`<li>${esc(a)}</li>`).join('')}</ul><b>Suggested daily plan</b><ol>${dayPlan}</ol><b>Resource plan</b><ul><li>Transport: NPR ${transport.toLocaleString()}</li><li>Accommodation: NPR ${stay.toLocaleString()}</li><li>Food: NPR ${food.toLocaleString()}</li><li>Activities / permits: NPR ${activities.toLocaleString()}</li><li>Contingency: NPR ${reserve.toLocaleString()}</li></ul><b>What to prepare</b><ul>${d.needs.map(n=>`<li>${esc(n)}</li>`).join('')}</ul><p class="text-muted">This is a planning estimate for ${ctx.group} traveller${ctx.group>1?'s':''}. Confirm current costs, bookings, permits, road conditions and weather before travel.</p>`;map.flyTo({center:coord,zoom:8.5})}
plannerUI=plannerUIDestinationFirst;
function previewInterestPlace(name){const d=TRIP_DETAILS[name];if(!d)return;window.tripDestinationChoices={days:+document.querySelector('#tripDays').value||d.days,budget:+document.querySelector('#tripBudget').value||0,vehicle:document.querySelector('#tripVehicle').value,comfort:document.querySelector('#tripComfort').value,pace:document.querySelector('#tripPace').value,group:+document.querySelector('#tripGroup').value||1,interests:[...filters.querySelectorAll('input[type=checkbox]:checked')].map(x=>x.value)};showTripDestinationDetail(name)}
function plannerUIInterestAware(){plannerUIDestinationFirst();const interestInputs=[...filters.querySelectorAll('input[type=checkbox]')];const refreshSuggestions=()=>{const selected=interestInputs.filter(input=>input.checked).map(input=>input.value);const matches=Object.entries(TRIP_DETAILS).filter(([,detail])=>selected.some(interest=>detail.tags.includes(interest)));result.innerHTML=selected.length?`<b>Places matching your selected interests</b><br><span class="text-muted">${selected.map(pretty).join(' · ')}</span><div class="choice-list">${matches.map(([name,detail])=>`<button class="map-ctrl-btn" onclick="previewInterestPlace('${esc(name)}')"><b>${esc(name)}</b><br><span class="text-muted">${esc(detail.tags.map(pretty).join(' · '))} · ${detail.days} days · from NPR ${(detail.cost*detail.days).toLocaleString()}</span></button>`).join('')}</div><p class="text-muted">Adjust days, budget, comfort and transport, then use “Find trips that fit my plan” to filter these places by your full criteria.</p>`:'Select one or more interests to see matching places.'};interestInputs.forEach(input=>input.addEventListener('change',refreshSuggestions));refreshSuggestions()}
plannerUI=plannerUIInterestAware;
// Keep broad cultural destinations distinct from food-led experiences.
TRIP_DETAILS.Kathmandu.tags=TRIP_DETAILS.Kathmandu.tags.filter(tag=>tag!=='food');
TRIP_DETAILS.Bhaktapur.tags=TRIP_DETAILS.Bhaktapur.tags.filter(tag=>tag!=='food');
TRIP_DETAILS['Kathmandu Food Trail']={tags:['food'],days:2,cost:2800,season:'Year-round; evening food walks are especially lively',stay:{budget:'Thamel hostel near local eateries',balanced:'Boutique hotel in Thamel',comfort:'Central luxury hotel with curated dining'},summary:'A food-first Kathmandu experience focused on Newari dishes, street snacks, cafés and market areas.',activities:['Ason and Indra Chowk market tasting','Newari meal in Kirtipur or Patan','Thamel café and momo trail'],needs:['Food-hygiene awareness','Small cash for market stalls','Dietary needs translated or written down']};
TRIP_DETAILS['Bhaktapur Food & Pottery']={tags:['food'],days:1,cost:2400,season:'Year-round; visit in the morning for market activity',stay:{budget:'Day trip from Kathmandu',balanced:'Bhaktapur heritage guesthouse',comfort:'Courtyard heritage stay'},summary:'A food and craft day focused on Newari cuisine, juju dhau, local bakeries and pottery traditions.',activities:['Juju dhau tasting','Newari lunch','Pottery Square craft session'],needs:['Entry ticket','Small cash','Reusable water bottle']};
TRIP_DETAILS['Pokhara Lakeside Food Trail']={tags:['food'],days:2,cost:3000,season:'Sep–Nov and Mar–May',stay:{budget:'Lakeside backpacker lodge',balanced:'Lakeside guesthouse',comfort:'Lake-view resort'},summary:'Lakeside dining, local Nepali food, cafés and a relaxed lakefront evening experience.',activities:['Lakeside café breakfast','Local Nepali thali','Evening food walk by Phewa Lake'],needs:['Rain layer in monsoon','Restaurant reservations for weekends','Cash for small vendors']};
TRIP_DESTINATIONS['Kathmandu Food Trail']=[85.315,27.705];
TRIP_DESTINATIONS['Bhaktapur Food & Pottery']=[85.43,27.672];
TRIP_DESTINATIONS['Pokhara Lakeside Food Trail']=[83.96,28.21];
const showTripDestinationDetailWithBack=showTripDestinationDetail;
showTripDestinationDetail=async function(name){showTripDestinationDetailWithBack(name);const coord=TRIP_DESTINATIONS[name];if(user&&coord){await route({type:'Feature',geometry:{type:'Point',coordinates:coord},properties:{name}});showTripDestinationDetailWithBack(name)}};
const showTripDestinationDetailBase=showTripDestinationDetail;
showTripDestinationDetail=function(name){showTripDestinationDetailBase(name);result.insertAdjacentHTML('afterbegin','<button class="map-ctrl-btn" style="margin-bottom:.65rem" onclick="returnToTripShortlist()">← Back to destination list</button>')};
function returnToTripShortlist(){if(window.tripDestinationChoices)buildDestinationShortlist()}
showTripDestinationDetail=async function(name){showTripDestinationDetailWithBack(name);const coord=TRIP_DESTINATIONS[name];if(user&&coord){await route({type:'Feature',geometry:{type:'Point',coordinates:coord},properties:{name}})}showTripDestinationDetailWithBack(name);result.insertAdjacentHTML('afterbegin','<button class="map-ctrl-btn" style="margin-bottom:.65rem" onclick="returnToTripShortlist()">← Back to destination list</button>')};
window.mappedAnalyzeRoute=window.analyzeRoute;
function bufferUI(){filters.innerHTML=`<label class="form-label">Radius: <span id="radiusValue" class="range-value">10 km</span></label><input id="radius" type="range" min="1" max="100" value="10"><label class="form-label">Place type</label><select id="type" class="form-select"><option value="all">Hotels & restaurants</option><option value="hotel">Hotels</option><option value="restaurant">Restaurants</option></select>`;radius.oninput=()=>radiusValue.textContent=radius.value+' km';document.querySelector('#locBtn').onclick=()=>locate(()=>{let r=+radius.value,t=type.value,buf=SpatialTools.createBuffer(turf.point(user),r,{units:'kilometers'}),items=data.hotels.features.filter(f=>(t==='all'||f.properties.type===t)&&turf.booleanPointInPolygon(f,buf));addPoints(items,'#e67e22',route);if(map.getSource('analysis'))map.getSource('analysis').setData(buf);else{map.addSource('analysis',{type:'geojson',data:buf});map.addLayer({id:'analysis-line',type:'fill',source:'analysis',paint:{'fill-color':'#468432','fill-opacity':.15}})}result.innerHTML=`<b>${items.length}</b> place(s) found within ${r} km. Click a marker to draw a route.`;})}
function emergencyUI(){filters.innerHTML=`<label class="form-label">Service</label><select id="type" class="form-select"><option value="all">All emergency services</option><option value="hospital">Hospitals</option><option value="health_post">Health posts</option><option value="police_station">Police offices</option></select>`;document.querySelector('#locBtn').textContent='🆘 Find nearest service';document.querySelector('#locBtn').onclick=()=>locate(()=>{let t=type.value,items=data.emergency.features.filter(f=>t==='all'||f.properties.type===t),n=SpatialTools.findNearest(turf.point(user),{type:'FeatureCollection',features:items});addPoints(items,'#e74c3c',route);if(n){route(n);result.innerHTML=`Nearest service: <b>${esc(n.properties.name)}</b><br>${esc(n.properties.type)} · ${fmtDist(SpatialTools.calcDistance(user,n.geometry.coordinates))}${n.properties.phone?'<br>Phone: '+esc(n.properties.phone):''}`}})}
function plannerUI(){filters.innerHTML=`<label class="form-label">Days</label><input id="days" class="form-input-field" type="number" min="1" max="21" value="5"><label class="form-label">Budget (NPR)</label><input id="budget" class="form-input-field" type="number" min="1000" value="20000"><label class="form-label">Travel means</label><select id="vehicle" class="form-select"><option value="car">Car</option><option value="bus">Bus</option><option value="bike">Bike</option><option value="walk">Walk</option></select>`;document.querySelector('#locBtn').textContent='🗺️ Plan from my location';document.querySelector('#locBtn').onclick=()=>locate(async()=>{let trip=await API.post('/api/trip/plan',{budget:+budget.value,days:+days.value,vehicle:vehicle.value,interests:['trekking','culture','nature'],start_location:'My GPS location'});let daysList=trip?.trip?.itinerary||[];result.innerHTML='<b>Your suggested itinerary</b>'+daysList.map(d=>`<br>Day ${d.day}: ${esc(d.destination)} — NPR ${d.estimated_cost_npr.toLocaleString()}`).join('');});}
</script></body></html>
